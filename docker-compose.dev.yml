# docker-compose.dev.yml — Infrastructure only, for local Nuxt dev
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d db rabbitmq docker-socket-proxy
#   cd src && npm run dev
#
# This override exposes the services the host-side Nuxt dev server needs:
# PostgreSQL, RabbitMQ, and docker-socket-proxy.

services:
  game-server:
    ports:
      - "127.0.0.1:${PZ_RCON_PORT:-27015}:${PZ_RCON_PORT:-27015}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ZM_API_BASE_URL: ${MOD_API_BASE_URL:-http://host.docker.internal:3000/api/mod}

  db:
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - backend-net
      - zomboid-net

  rabbitmq:
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    networks:
      - backend-net
      - zomboid-net

  docker-socket-proxy:
    ports:
      - "127.0.0.1:2375:2375"
    networks:
      - backend-net
      - zomboid-net  # allow host access via published port

networks:
  backend-net:
  zomboid-net:
