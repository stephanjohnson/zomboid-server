services:
  # ---------------------------------------------------------------------------
  # PZ Game Server — Dedicated server via SteamCMD
  # ---------------------------------------------------------------------------
  game-server:
    image: ${GAME_SERVER_IMAGE:-renegademaster/zomboid-dedicated-server:latest}
    container_name: ${GAME_SERVER_CONTAINER_NAME:-pzm-game-server}
    entrypoint: ["/bin/bash", "/home/steam/entrypoint.sh"]
    restart: unless-stopped
    mem_limit: ${GAME_SERVER_MEM_LIMIT:-4g}
    mem_reservation: ${GAME_SERVER_MEM_RESERVATION:-3g}
    ports:
      - "${PZ_GAME_PORT:-16261}:${PZ_GAME_PORT:-16261}/udp"
      - "${PZ_DIRECT_PORT:-16262}:${PZ_DIRECT_PORT:-16262}/udp"
    volumes:
      - zomboid-data:/home/steam/Zomboid
      - lua-bridge:/home/steam/Zomboid/Lua
      - zomboid-server:/home/steam/ZomboidDedicatedServer
      - ./game-server/entrypoint.sh:/home/steam/entrypoint.sh:ro
      - ./game-server/configure-server.sh:/home/steam/configure-server.sh:ro
      - ./lua-bridge/ZomboidManager:/opt/ZomboidManager-source:ro
    environment:
      ADMIN_PASSWORD: ${PZ_ADMIN_PASSWORD:-${PZ_RCON_PASSWORD:-}}
      ADMIN_USERNAME: ${PZ_ADMIN_USERNAME:-admin}
      AUTOSAVE_INTERVAL: ${PZ_AUTOSAVE_INTERVAL:-15}
      BIND_IP: "0.0.0.0"
      DEFAULT_PORT: ${PZ_GAME_PORT:-16261}
      GAME_VERSION: ${PZ_STEAM_BRANCH:-public}
      MAP_NAMES: ${PZ_MAP_NAMES:-Muldraugh, KY}
      MAX_PLAYERS: ${PZ_MAX_PLAYERS:-16}
      MAX_RAM: ${PZ_MAX_RAM:-3072m}
      MOD_NAMES: "${PZ_MOD_IDS:-ZomboidManager}"
      MOD_WORKSHOP_IDS: ${PZ_WORKSHOP_IDS:-3685323705}
      PAUSE_ON_EMPTY: ${PZ_PAUSE_ON_EMPTY:-true}
      PUBLIC_SERVER: ${PZ_PUBLIC_SERVER:-true}
      RCON_PASSWORD: ${PZ_RCON_PASSWORD:-}
      RCON_PORT: ${PZ_RCON_PORT:-27015}
      SERVER_NAME: ${SERVERNAME:-servertest}
      STEAM_VAC: ${PZ_STEAM_VAC:-true}
      UDP_PORT: ${PZ_DIRECT_PORT:-16262}
      USE_STEAM: "true"
      TZ: ${TZ:-UTC}
    networks:
      - zomboid-net

  # ---------------------------------------------------------------------------
  # Nuxt App — Dashboard UI + Nitro API
  # ---------------------------------------------------------------------------
  nitro-app:
    build:
      context: ./src
      dockerfile: Dockerfile
      args:
        NITRO_BUILD_MAX_OLD_SPACE_SIZE: ${NITRO_BUILD_MAX_OLD_SPACE_SIZE:-4096}
    container_name: pzm-nitro-app
    restart: unless-stopped
    mem_limit: ${NITRO_APP_MEM_LIMIT:-768m}
    mem_reservation: ${NITRO_APP_MEM_RESERVATION:-384m}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    volumes:
      - zomboid-data:/pzm-data
      - zomboid-server:/pzm-server:ro
      - backup-data:/backups
      - lua-bridge:/lua-bridge
      - ./game-server/entrypoint.sh:/opt/game-server/entrypoint.sh:ro
      - ./game-server/configure-server.sh:/opt/game-server/configure-server.sh:ro
      - ./lua-bridge/ZomboidManager:/opt/ZomboidManager-source:ro
    env_file: .env
    environment:
      NUXT_DB_HOST: ${DB_HOST:-db}
      NUXT_DB_PORT: ${DB_PORT:-5432}
      NUXT_DB_NAME: ${DB_NAME:-zomboid}
      NUXT_DB_USER: ${DB_USER:-zomboid}
      NUXT_DB_PASSWORD: ${DB_PASSWORD:-zomboid}
      DATABASE_URL: postgresql://${DB_USER:-zomboid}:${DB_PASSWORD:-zomboid}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME:-zomboid}
      NUXT_DATABASE_URL: postgresql://${DB_USER:-zomboid}:${DB_PASSWORD:-zomboid}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME:-zomboid}
      NUXT_RABBITMQ_URL: amqp://${RABBITMQ_USER:-zomboid}:${RABBITMQ_PASSWORD:-zomboid}@${RABBITMQ_HOST:-rabbitmq}:${RABBITMQ_PORT:-5672}
      NUXT_DOCKER_PROXY_URL: http://docker-socket-proxy:2375
      NUXT_PZ_RCON_HOST: game-server
      NUXT_PZ_RCON_PORT: ${PZ_RCON_PORT:-27015}
      NUXT_PZ_RCON_PASSWORD: ${PZ_RCON_PASSWORD:-}
      NUXT_PZ_DATA_PATH: /pzm-data
      NUXT_PZ_SERVER_PATH: /pzm-server
      NUXT_BACKUP_PATH: /backups
      NUXT_LUA_BRIDGE_PATH: /lua-bridge
      NUXT_GAME_SERVER_DATA_MOUNT_SOURCE: pzm-data
      NUXT_GAME_SERVER_LUA_BRIDGE_MOUNT_SOURCE: pzm-lua-bridge
      NUXT_GAME_SERVER_SERVER_FILES_MOUNT_SOURCE: pzm-server-files
      NUXT_GAME_SERVER_CONTAINER_NAME: ${GAME_SERVER_CONTAINER_NAME:-pzm-game-server}
      NUXT_GAME_SERVER_ENTRYPOINT_PATH: /opt/game-server/entrypoint.sh
      NUXT_GAME_SERVER_CONFIGURE_SCRIPT_PATH: /opt/game-server/configure-server.sh
      NUXT_GAME_SERVER_MOD_SOURCE_MOUNT: /opt/ZomboidManager-source
      GAME_SERVER_MEM_LIMIT: ${GAME_SERVER_MEM_LIMIT:-4g}
      GAME_SERVER_MEM_RESERVATION: ${GAME_SERVER_MEM_RESERVATION:-3g}
      PZ_MAX_RAM: ${PZ_MAX_RAM:-3072m}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    networks:
      - zomboid-net
      - backend-net

  # ---------------------------------------------------------------------------
  # Worker — Background job processor (backups, updates, restarts)
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: pzm-worker
    restart: unless-stopped
    mem_limit: ${WORKER_MEM_LIMIT:-512m}
    mem_reservation: ${WORKER_MEM_RESERVATION:-256m}
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - zomboid-data:/pzm-data
      - zomboid-server:/pzm-server:ro
      - backup-data:/backups
      - lua-bridge:/lua-bridge
      - ./game-server/entrypoint.sh:/opt/game-server/entrypoint.sh:ro
      - ./game-server/configure-server.sh:/opt/game-server/configure-server.sh:ro
      - ./lua-bridge/ZomboidManager:/opt/ZomboidManager-source:ro
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${DB_USER:-zomboid}:${DB_PASSWORD:-zomboid}@${DB_HOST:-db}:${DB_PORT:-5432}/${DB_NAME:-zomboid}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-zomboid}:${RABBITMQ_PASSWORD:-zomboid}@${RABBITMQ_HOST:-rabbitmq}:${RABBITMQ_PORT:-5672}
      DOCKER_PROXY_URL: http://docker-socket-proxy:2375
      PZ_RCON_HOST: game-server
      PZ_RCON_PORT: ${PZ_RCON_PORT:-27015}
      PZ_RCON_PASSWORD: ${PZ_RCON_PASSWORD:-}
      PZ_DATA_PATH: /pzm-data
      PZ_SERVER_PATH: /pzm-server
      BACKUP_PATH: /backups
      LUA_BRIDGE_PATH: /lua-bridge
      GAME_SERVER_DATA_MOUNT_SOURCE: pzm-data
      GAME_SERVER_LUA_BRIDGE_MOUNT_SOURCE: pzm-lua-bridge
      GAME_SERVER_SERVER_FILES_MOUNT_SOURCE: pzm-server-files
      GAME_SERVER_CONTAINER_NAME: ${GAME_SERVER_CONTAINER_NAME:-pzm-game-server}
      GAME_SERVER_ENTRYPOINT_MOUNT: /opt/game-server/entrypoint.sh
      GAME_SERVER_CONFIGURE_SCRIPT_MOUNT: /opt/game-server/configure-server.sh
      GAME_SERVER_MOD_SOURCE_MOUNT: /opt/ZomboidManager-source
      GAME_SERVER_MEM_LIMIT: ${GAME_SERVER_MEM_LIMIT:-4g}
      GAME_SERVER_MEM_RESERVATION: ${GAME_SERVER_MEM_RESERVATION:-3g}
      PZ_MAX_RAM: ${PZ_MAX_RAM:-3072m}
    cap_drop:
      - ALL
    networks:
      - zomboid-net
      - backend-net

  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: pzm-db
    restart: unless-stopped
    mem_limit: ${DB_MEM_LIMIT:-512m}
    mem_reservation: ${DB_MEM_RESERVATION:-256m}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME:-zomboid}
      POSTGRES_USER: ${DB_USER:-zomboid}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zomboid}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-zomboid} -d ${DB_NAME:-zomboid}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # RabbitMQ — Job queue broker
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pzm-rabbitmq
    restart: unless-stopped
    mem_limit: ${RABBITMQ_MEM_LIMIT:-256m}
    mem_reservation: ${RABBITMQ_MEM_RESERVATION:-128m}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-zomboid}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-zomboid}
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # Docker Socket Proxy — Restricted Docker API access
  # ---------------------------------------------------------------------------
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: pzm-docker-proxy
    restart: unless-stopped
    mem_limit: ${DOCKER_PROXY_MEM_LIMIT:-64m}
    mem_reservation: ${DOCKER_PROXY_MEM_RESERVATION:-32m}
    environment:
      CONTAINERS: 1
      IMAGES: 1
      POST: 1
      LOG: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # Caddy — Reverse proxy with automatic TLS
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: pzm-caddy
    restart: unless-stopped
    mem_limit: ${CADDY_MEM_LIMIT:-128m}
    mem_reservation: ${CADDY_MEM_RESERVATION:-64m}
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - nitro-app
    networks:
      - zomboid-net

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  zomboid-net:
    driver: bridge
    # Not internal — game-server needs internet for SteamCMD
    # RCON port not published to host, only between containers
  backend-net:
    driver: bridge
    internal: true
    # Internal — db, rabbitmq, docker-proxy never exposed to host

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  zomboid-server:
    name: pzm-server-files
  zomboid-data:
    name: pzm-data
  postgres-data:
    name: pzm-postgres
  rabbitmq-data:
    name: pzm-rabbitmq
  backup-data:
    name: pzm-backups
  lua-bridge:
    name: pzm-lua-bridge
  caddy-data:
    name: pzm-caddy-data
  caddy-config:
    name: pzm-caddy-config
